<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div,#ter{
            border-radius: 40px;
        }
    </style>
</head>
<body style="background-color: rgb(64, 12, 236);text-align: center;">
    <form action="/submit_registration" method="post"></form>
        <label for="username" style="border-radius: 40px;">Username:</label>
        <input type="text" id="username" name="username" required placeholder="username"  style="border-radius: 40px;background-color: green;color: rgb(0, 42, 255);"><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email"  style="border-radius: 40px;background-color: green;color: rgb(0, 72, 255);"><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="password"  style="border-radius: 40px;background-color: green;color: rgb(0, 4, 255);"><br><br>
    <br>
    
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required placeholder="confirm_password" style="border-radius: 40px;background-color: green;color: rgb(6, 49, 244);"><br><br>
        <input type="submit" value="Register" style="background-color: blue;">

    </form>
